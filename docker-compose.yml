version: "3.9"

services:
  agent-pilot:
    build: .
    container_name: agent-pilot
    env_file: .env
    ports:
      - "8001:8001"
      - "8002:8002"
      - "8767:8767"
    volumes:
      - pilot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: agent-pilot-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data

volumes:
  pilot-data:
  redis-data:
