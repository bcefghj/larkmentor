<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agent-Pilot 分享 · LarkMentor v2</title>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f6f8fa; margin: 0; padding: 32px; color: #1f2328; }
  .container { max-width: 880px; margin: 0 auto; background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  h1 { font-size: 24px; margin-top: 0; }
  .meta { color: #6a737d; font-size: 13px; margin-bottom: 24px; }
  .step { border-left: 3px solid #0969da; padding-left: 14px; margin-bottom: 18px; }
  .step.failed { border-left-color: #cf222e; }
  .step-tool { font-family: "SF Mono", Menlo, monospace; color: #0969da; font-size: 13px; }
  .step-desc { margin: 4px 0 6px 0; font-weight: 500; }
  .step-result { background: #f6f8fa; padding: 10px; border-radius: 6px; font-family: "SF Mono", Menlo, monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
  .artifact-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-top: 16px; }
  .artifact-card { background: #f6f8fa; padding: 14px; border-radius: 8px; }
  .artifact-card a { color: #0969da; text-decoration: none; display: block; word-break: break-all; }
  pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">Agent-Pilot 汇报</h1>
  <div class="meta" id="meta">加载中…</div>
  <h2>产物</h2>
  <div class="artifact-cards" id="artifacts">—</div>
  <h2>执行步骤</h2>
  <div id="steps"></div>
</div>
<script>
const planId = "{{PLAN_ID}}";
fetch('/api/pilot/plan/' + planId).then(r => r.json()).then(p => {
  document.getElementById('title').textContent = `Agent-Pilot · ${p.intent || planId}`;
  document.getElementById('meta').textContent =
    `Plan: ${planId} · 创建于 ${new Date((p.created_ts||0)*1000).toLocaleString()} · 共 ${(p.steps||[]).length} 步`;
  const artifacts = [];
  (p.steps || []).forEach(s => {
    ['url','pptx_url','pdf_url','share_url','markdown_path'].forEach(k => {
      if (s.result && s.result[k]) artifacts.push({ tool: s.tool, key: k, url: s.result[k] });
    });
  });
  document.getElementById('artifacts').innerHTML = artifacts.length
    ? artifacts.map(a => `<div class="artifact-card"><div><strong>${a.tool}</strong></div>
       <div style="color:#6a737d;font-size:12px;margin:4px 0">${a.key}</div>
       <a href="${a.url}" target="_blank">${a.url}</a></div>`).join('')
    : '<div class="artifact-card">暂无外链产物</div>';
  document.getElementById('steps').innerHTML = (p.steps || []).map((s, i) =>
    `<div class="step ${s.status}">
       <div class="step-tool">${i+1}. ${s.tool}</div>
       <div class="step-desc">${s.description||''}</div>
       <div class="step-result">${JSON.stringify(s.result||{}, null, 2)}</div>
     </div>`).join('');
});
</script>
</body>
</html>
