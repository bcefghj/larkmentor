<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent-Pilot v7 · 主驾驶舱</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
header h1{font-size:20px;color:var(--accent)}
header .status{display:flex;gap:12px;font-size:13px}
header .status .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
header .status .online .dot{background:var(--green)}
header .status .offline .dot{background:var(--red)}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0}
.tab{padding:8px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:14px;color:var(--text);opacity:0.7;transition:all .2s}
.tab:hover{opacity:1}
.tab.active{border-bottom-color:var(--accent);opacity:1;color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.card h3{font-size:14px;color:var(--accent);margin-bottom:8px}
.card .value{font-size:28px;font-weight:600;color:var(--text)}
.card .sub{font-size:12px;color:#8b949e;margin-top:4px}
.task-list{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.task-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.task-item:hover{background:#1c2128}
.task-item:last-child{border-bottom:none}
.task-item .state{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.state-suggested{background:#1f2d1a;color:var(--green)}
.state-planning,.state-assigned{background:#1a2233;color:var(--accent)}
.state-generating{background:#2a1a0a;color:var(--yellow)}
.state-reviewing{background:#1f1a2e;color:var(--purple)}
.state-delivered{background:#0d2818;color:var(--green)}
.state-failed{background:#2d1216;color:var(--red)}
.task-item .title{flex:1;font-size:14px}
.task-item .time{font-size:12px;color:#8b949e}
.panel{display:none}
.panel.active{display:block}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:16px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:6px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:16px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.timeline-item .ts{font-size:11px;color:#8b949e}
.timeline-item .content{font-size:13px;margin-top:4px}
.radar-container{display:flex;justify-content:center;padding:20px}
.empty{text-align:center;padding:40px;color:#8b949e;font-size:14px}
table{width:100%;border-collapse:collapse}
table th,table td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
table th{color:var(--accent);font-weight:500}
.memory-tier{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border)}
.memory-tier .level{width:80px;font-weight:500;font-size:13px;color:var(--accent)}
.memory-tier .bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.memory-tier .bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>Agent-Pilot v7 · 主驾驶舱</h1>
  <div class="status">
    <span class="online" id="conn-status"><span class="dot"></span>已连接</span>
    <button class="refresh-btn" onclick="refresh()">刷新</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('pilot')">Pilot 任务</div>
  <div class="tab" onclick="switchTab('memory')">6级 Memory</div>
  <div class="tab" onclick="switchTab('triad')">三线雷达</div>
</div>

<div id="panel-pilot" class="panel active">
  <div class="grid" id="stats-grid"></div>
  <h3 style="margin-bottom:12px;font-size:15px">任务列表</h3>
  <div class="task-list" id="task-list"><div class="empty">加载中...</div></div>
</div>

<div id="panel-memory" class="panel">
  <div class="card" style="margin-bottom:16px">
    <h3>6 层 FlowMemory 注入</h3>
    <div class="sub">Enterprise → Workspace → Department → Group → User → Session</div>
  </div>
  <div class="card" id="memory-tiers"></div>
</div>

<div id="panel-triad" class="panel">
  <div class="grid">
    <div class="card"><h3>@shield 消息守护</h3><div class="value" id="shield-score">—</div><div class="sub">6维分类 + Recovery Card</div></div>
    <div class="card"><h3>@mentor 表达带教</h3><div class="value" id="mentor-score">—</div><div class="sub">Write/Task/Review/Onboard</div></div>
    <div class="card"><h3>@pilot 主驾驶</h3><div class="value" id="pilot-score">—</div><div class="sub">IntentDetector + ContextPack</div></div>
  </div>
  <div class="card" style="margin-top:16px">
    <h3>三线联动时间线</h3>
    <div class="timeline" id="triad-timeline"><div class="empty">暂无数据</div></div>
  </div>
</div>
</div>

<script>
const API = window.location.origin;
let currentTab = 'pilot';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="'${tab}'"]`).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  refresh();
}

async function fetchJSON(path) {
  try {
    const r = await fetch(API + path);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

function stateClass(state) {
  if (!state) return '';
  const s = state.toLowerCase();
  if (s.includes('suggest')) return 'state-suggested';
  if (s.includes('plan') || s.includes('assign')) return 'state-planning';
  if (s.includes('generat')) return 'state-generating';
  if (s.includes('review')) return 'state-reviewing';
  if (s.includes('deliver')) return 'state-delivered';
  if (s.includes('fail')) return 'state-failed';
  return 'state-planning';
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now()/1000 - ts) / 60);
  if (d < 1) return '刚刚';
  if (d < 60) return d + '分钟前';
  if (d < 1440) return Math.floor(d/60) + '小时前';
  return Math.floor(d/1440) + '天前';
}

async function loadPilot() {
  const tasks = await fetchJSON('/api/v7/tasks');
  const stats = await fetchJSON('/api/v7/intent_stats');

  const grid = document.getElementById('stats-grid');
  const list = tasks || [];
  const active = list.filter(t => !['delivered','failed','ignored'].includes((t.state||'').toLowerCase()));
  grid.innerHTML = `
    <div class="card"><h3>总任务数</h3><div class="value">${list.length}</div></div>
    <div class="card"><h3>进行中</h3><div class="value">${active.length}</div></div>
    <div class="card"><h3>已完成</h3><div class="value">${list.filter(t=>(t.state||'').toLowerCase()==='delivered').length}</div></div>
    <div class="card"><h3>意图识别</h3><div class="value">${stats?.total_intents || '—'}</div><div class="sub">三闸门命中率 ${stats?.hit_rate || '—'}%</div></div>
  `;

  const taskList = document.getElementById('task-list');
  if (!list.length) { taskList.innerHTML = '<div class="empty">暂无任务</div>'; return; }
  taskList.innerHTML = list.map(t => `
    <div class="task-item" onclick="alert('Task: ${t.task_id}\\n状态: ${t.state}\\n意图: ${t.intent||""}')">
      <span class="state ${stateClass(t.state)}">${t.state || '?'}</span>
      <span class="title">${t.title || t.intent || t.task_id}</span>
      <span class="time">${timeAgo(t.created_ts)}</span>
    </div>
  `).join('');
}

async function loadMemory() {
  const data = await fetchJSON('/api/v7/memory');
  const tiers = document.getElementById('memory-tiers');
  const levels = ['Enterprise','Workspace','Department','Group','User','Session'];
  if (data && data.tiers) {
    tiers.innerHTML = data.tiers.map((t,i) => `
      <div class="memory-tier">
        <span class="level">${levels[i] || t.level}</span>
        <div class="bar"><div class="bar-fill" style="width:${Math.min(100, (t.entries||0)*10)}%"></div></div>
        <span style="font-size:12px;color:#8b949e">${t.entries||0} 条</span>
      </div>
    `).join('');
  } else {
    tiers.innerHTML = levels.map(l => `
      <div class="memory-tier"><span class="level">${l}</span><div class="bar"><div class="bar-fill" style="width:0%"></div></div><span style="font-size:12px;color:#8b949e">0 条</span></div>
    `).join('');
  }
}

async function loadTriad() {
  const data = await fetchJSON('/api/v7/triad');
  if (data) {
    document.getElementById('shield-score').textContent = data.shield?.score ?? '—';
    document.getElementById('mentor-score').textContent = data.mentor?.score ?? '—';
    document.getElementById('pilot-score').textContent = data.pilot?.score ?? '—';
  }
  const timeline = await fetchJSON('/api/v7/timeline');
  const el = document.getElementById('triad-timeline');
  if (timeline && timeline.length) {
    el.innerHTML = timeline.slice(0,20).map(e => `
      <div class="timeline-item">
        <div class="ts">${new Date((e.ts||0)*1000).toLocaleString('zh-CN')}</div>
        <div class="content"><strong>[${e.kind||'event'}]</strong> ${e.data||e.content||''}</div>
      </div>
    `).join('');
  }
}

async function refresh() {
  if (currentTab === 'pilot') await loadPilot();
  else if (currentTab === 'memory') await loadMemory();
  else if (currentTab === 'triad') await loadTriad();
}

refresh();
setInterval(refresh, 15000);

// WebSocket live updates
try {
  const ws = new WebSocket((location.protocol==='https:'?'wss:':'ws:') + '//' + location.host + '/ws');
  ws.onopen = () => { document.getElementById('conn-status').className = 'online'; };
  ws.onclose = () => { document.getElementById('conn-status').className = 'offline'; document.querySelector('#conn-status .dot').nextSibling.textContent = '已断开'; };
  ws.onmessage = (e) => { if (currentTab === 'pilot') loadPilot(); };
} catch {}
</script>
</body>
</html>
