<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent-Pilot V2.0 Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "PingFang SC", Inter, sans-serif; background: #0a0e27; color: #e2e8f0; }
  .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
  .gradient-text { background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .pulse-dot { animation: pulse-dot 1.5s infinite; }
  @keyframes slide-in { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-in { animation: slide-in 0.3s ease-out; }
  pre { white-space: pre-wrap; word-break: break-all; }
  .progress-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, #60a5fa, #c084fc); transition: width 0.4s ease-out; }
  .status-running { color: #60a5fa; }
  .status-succeeded { color: #34d399; }
  .status-failed { color: #f87171; }
</style>
</head>
<body class="min-h-screen">

<header class="border-b border-white/10 px-6 py-4">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="/" class="text-2xl">🛫</a>
      <div>
        <div class="font-bold gradient-text">Agent-Pilot V2.0 Dashboard</div>
        <div class="text-xs text-slate-400">plan_id: <span id="plan-id-display" class="font-mono">{{PLAN_ID}}</span></div>
      </div>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <span class="text-slate-400">已用时 <span id="elapsed" class="text-blue-300 font-mono">0s</span></span>
      <span class="w-2 h-2 rounded-full bg-green-400 pulse-dot"></span>
      <span id="ws-status" class="text-slate-400">连接中</span>
    </div>
  </div>
</header>

<!-- 参考 Dify 三段式布局: Result + Detail + Tracing -->
<main class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-4">

  <!-- 左栏: Sessions + 任务总结(Result) -->
  <aside class="lg:col-span-3 space-y-4">
    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">任务总结</h2>
      <div id="summary-area" class="text-sm text-slate-300">
        <div class="text-slate-500">等待任务完成...</div>
      </div>
    </div>
    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">最近任务</h2>
      <div id="session-list" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
    </div>
  </aside>

  <!-- 中栏: Tracing（Agent 事件流） -->
  <section class="lg:col-span-6 glass rounded-2xl p-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="font-bold gradient-text">Agent 执行追踪</h2>
      <span class="text-xs text-slate-400">
        <span id="agent-count">0</span> 个 Agent · <span id="step-completed">0</span> 步完成
      </span>
    </div>
    <div class="progress-bar mb-4"><div id="progress-fill" style="width: 0%"></div></div>

    <div id="thinking-stream" class="space-y-2 max-h-[520px] overflow-y-auto font-mono text-xs"></div>
  </section>

  <!-- 右栏: Detail（产出 + 工具 + 统计） -->
  <aside class="lg:col-span-3 space-y-4">
    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">产出物</h2>
      <div id="artifact-list" class="space-y-2 text-xs max-h-[200px] overflow-y-auto">
        <div class="text-slate-500">等待产出...</div>
      </div>
    </div>

    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">执行统计</h2>
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="text-slate-400">状态</div><div id="stat-status" class="status-running font-bold">运行中</div>
        <div class="text-slate-400">耗时</div><div id="stat-elapsed" class="font-mono">-</div>
        <div class="text-slate-400">迭代轮数</div><div id="stat-iterations" class="font-mono">-</div>
        <div class="text-slate-400">Agent 数</div><div id="stat-agents" class="font-mono">-</div>
      </div>
    </div>

    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">工具能力</h2>
      <div id="tool-list" class="space-y-1 text-xs max-h-[180px] overflow-y-auto"></div>
    </div>
  </aside>
</main>

<script>
const planId = (new URLSearchParams(location.search).get("plan_id")) ||
               document.getElementById("plan-id-display").textContent.replace("{{PLAN_ID}}", "").trim() || "";
document.getElementById("plan-id-display").textContent = planId || "(未指定)";

const KIND_LABELS = {
  "pipeline_start": "🛫 Pipeline 启动",
  "pipeline_done": "🎉 Pipeline 完成",
  "pipeline_error": "❌ Pipeline 失败",
  "pipeline_summary": "📋 任务总结",
  "agent.start": "🤖 Agent 启动",
  "agent.done": "✅ Agent 完成",
  "agent.revise": "🔄 要求修改",
  "plan_start": "🛫 任务启动",
  "plan_done": "🎉 任务交付",
  "plan_error": "❌ 任务失败",
  "step.start": "🚀 步骤开始",
  "step.done": "✅ 步骤完成",
  "step.failed": "❌ 步骤失败",
};

const TOOL_LABELS = {
  "doc.create": "📄 创建飞书文档",
  "doc.append": "📝 AI 生成文档内容",
  "slide.generate": "📊 生成 PPT",
  "web.search": "🌐 联网搜索",
  "media.tts": "🔊 文字转语音",
};

function labelOf(kind) { return KIND_LABELS[kind] || kind; }
function bjTime(ts) {
  return new Date(ts * 1000).toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai', hour12: false});
}
function bjTimeShort(ts) {
  return new Date(ts * 1000).toLocaleTimeString('zh-CN', {timeZone: 'Asia/Shanghai', hour12: false});
}

let planStartedAt = null;
let agentSet = new Set();
let stepCompleted = 0;

setInterval(() => {
  if (!planStartedAt) return;
  const sec = Math.floor(Date.now() / 1000 - planStartedAt);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const str = (m > 0 ? `${m}m${s}s` : `${s}s`);
  document.getElementById("elapsed").textContent = str;
  document.getElementById("stat-elapsed").textContent = str;
}, 1000);

function updateProgress() {
  const total = Math.max(agentSet.size * 2, stepCompleted + 1);
  const pct = Math.min(100, Math.round(stepCompleted / total * 100));
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("step-completed").textContent = stepCompleted;
  document.getElementById("agent-count").textContent = agentSet.size;
  document.getElementById("stat-agents").textContent = agentSet.size;
}

function pushArtifact(a) {
  const dom = document.getElementById("artifact-list");
  if (dom.querySelector(".text-slate-500")) dom.innerHTML = "";
  const it = document.createElement("a");
  it.className = "block p-2 rounded hover:bg-white/5 slide-in";
  const url = a.url || a.uri || "#";
  const kind = a.kind || a.type || "artifact";
  const ttl = a.title || kind;
  const emoji = {doc: "📄", canvas: "🎨", slide: "📊", tts: "🔊"}[kind] || "📦";
  it.href = url; it.target = "_blank";
  it.innerHTML = `<div class="text-blue-200">${emoji} ${ttl}</div><div class="text-slate-500 text-[10px] truncate">${url}</div>`;
  dom.appendChild(it);
}

function setSummary(text) {
  document.getElementById("summary-area").innerHTML = `<div class="text-green-200">${text}</div>`;
}

// Sessions
async function loadSessions() {
  try {
    const list = await fetch("/api/sessions?limit=20").then(r => r.json());
    const dom = document.getElementById("session-list");
    dom.innerHTML = "";
    if (!list.length) {
      dom.innerHTML = '<div class="text-slate-500 text-sm">暂无任务记录</div>';
      return;
    }
    for (const s of list) {
      const card = document.createElement("a");
      card.href = "?plan_id=" + s.session_id;
      const isActive = s.session_id === planId;
      card.className = `block p-2 rounded-lg hover:bg-white/5 slide-in ${isActive ? 'border border-blue-500/30' : ''}`;
      card.innerHTML = `
        <div class="font-mono text-xs ${isActive ? 'text-blue-300' : 'text-slate-400'}">${(s.session_id||"").slice(0, 28)}</div>
      `;
      dom.appendChild(card);
    }
  } catch (e) { console.warn(e); }
}

// Tools
async function loadTools() {
  try {
    const tools = await fetch("/api/tools").then(r => r.json());
    const dom = document.getElementById("tool-list");
    dom.innerHTML = "";
    for (const t of tools) {
      const it = document.createElement("div");
      it.className = "flex items-center gap-2 p-1 rounded hover:bg-white/5";
      const dot = t.read_only ? "bg-blue-400" : "bg-orange-400";
      const cn = TOOL_LABELS[t.name] || t.name;
      it.innerHTML = `<span class="w-2 h-2 rounded-full ${dot}"></span><span class="text-blue-200">${cn}</span>`;
      dom.appendChild(it);
    }
  } catch (e) { console.warn(e); }
}

// SSE（参考 OpenHarness 标准事件类型）
function subscribeEvents() {
  if (!planId) return;
  document.getElementById("ws-status").textContent = "实时";

  try {
    const es = new EventSource("/api/events/" + planId);
    es.onmessage = (e) => {
      try {
        const evt = JSON.parse(e.data);
        const dom = document.getElementById("thinking-stream");

        // Pipeline 生命周期
        if (evt.kind === "pipeline_start") {
          planStartedAt = evt.ts || Math.floor(Date.now() / 1000);
          document.getElementById("stat-status").textContent = "运行中";
          document.getElementById("stat-status").className = "status-running font-bold";
        }
        if (evt.kind === "pipeline_done") {
          document.getElementById("stat-status").textContent = "已完成";
          document.getElementById("stat-status").className = "status-succeeded font-bold";
          document.getElementById("ws-status").textContent = "完成";
          document.getElementById("stat-iterations").textContent = evt.payload?.iterations || "-";
          if (evt.payload?.summary) setSummary(evt.payload.summary);
          for (const a of (evt.payload?.artifacts || [])) pushArtifact(a);
        }
        if (evt.kind === "pipeline_error") {
          document.getElementById("stat-status").textContent = "失败";
          document.getElementById("stat-status").className = "status-failed font-bold";
        }
        if (evt.kind === "pipeline_summary") {
          if (evt.payload?.summary) setSummary(evt.payload.summary);
        }

        // Agent 事件
        if (evt.kind === "agent.start") {
          agentSet.add(evt.payload?.agent || "");
          updateProgress();
        }
        if (evt.kind === "agent.done") {
          stepCompleted++;
          updateProgress();
        }

        // 渲染事件行
        const tStr = bjTimeShort(evt.ts || Math.floor(Date.now()/1000));
        const agentName = evt.payload?.agent ? `<span class="text-purple-300">[${evt.payload.agent}]</span>` : "";
        const detail = evt.payload?.step || evt.payload?.feedback || JSON.stringify(evt.payload || {}).slice(0, 150);

        const item = document.createElement("div");
        item.className = "p-2 rounded slide-in flex gap-2 items-start";
        item.innerHTML = `
          <span class="text-slate-500 shrink-0">${tStr}</span>
          <span class="shrink-0">${labelOf(evt.kind)}</span>
          ${agentName}
          <span class="text-slate-300 truncate">${detail}</span>
        `;
        dom.insertBefore(item, dom.firstChild);
      } catch (err) { console.warn(err); }
    };
    es.onerror = () => { document.getElementById("ws-status").textContent = "重连中"; };
  } catch (e) { console.warn(e); }
}

function init() {
  if (!planId) {
    document.getElementById("thinking-stream").innerHTML =
      '<div class="text-slate-500 text-center py-8">在飞书发送任务即可实时查看 Agent 执行过程<br><br>示例：<code class="text-blue-300">帮我写一份关于 AI Agent 的技术报告</code></div>';
    return;
  }
}

loadSessions(); loadTools(); init(); subscribeEvents();
setInterval(loadSessions, 15000);
</script>
</body>
</html>
