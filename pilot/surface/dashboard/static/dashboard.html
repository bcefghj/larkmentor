<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>仪表盘 · Agent-Pilot V1.5</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "PingFang SC", Inter, sans-serif; background: #0a0e27; color: #e2e8f0; }
  .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
  .gradient-text { background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .pulse-dot { animation: pulse-dot 1.5s infinite; }
  @keyframes slide-in { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .slide-in { animation: slide-in 0.3s ease-out; }
  pre { white-space: pre-wrap; word-break: break-all; }
  .step-running { background: linear-gradient(90deg, rgba(96,165,250,0.18), transparent); border-left: 3px solid #60a5fa; }
  .step-done { border-left: 3px solid #34d399; }
  .step-failed { border-left: 3px solid #f87171; }
  .step-pending { border-left: 3px solid #475569; opacity: 0.55; }
  .progress-bar { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, #60a5fa, #c084fc); transition: width 0.4s ease-out; }
</style>
</head>
<body class="min-h-screen">

<header class="border-b border-white/10 px-6 py-4">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="/" class="text-2xl">🛫</a>
      <div>
        <div class="font-bold gradient-text">Agent-Pilot V1.5 仪表盘</div>
        <div class="text-xs text-slate-400">plan_id: <span id="plan-id-display">{{PLAN_ID}}</span></div>
      </div>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <span class="text-slate-400">已用时 <span id="elapsed" class="text-blue-300 font-mono">0s</span></span>
      <span class="w-2 h-2 rounded-full bg-green-400 pulse-dot"></span>
      <span id="ws-status" class="text-slate-400">连接中</span>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-4">
  <aside class="lg:col-span-3 glass rounded-2xl p-4">
    <h2 class="font-bold mb-3 gradient-text">最近 Sessions</h2>
    <div id="session-list" class="space-y-2 max-h-[600px] overflow-y-auto"></div>
  </aside>

  <section class="lg:col-span-6 glass rounded-2xl p-4">
    <div class="flex items-center justify-between mb-2">
      <h2 class="font-bold gradient-text">执行进度</h2>
      <span class="text-xs text-slate-400"><span id="step-completed">0</span> / <span id="step-total">0</span> 步完成</span>
    </div>
    <div class="progress-bar mb-4"><div id="progress-fill" style="width: 0%"></div></div>

    <h3 class="font-bold mb-2 text-sm text-slate-400">事件流</h3>
    <div id="thinking-stream" class="space-y-2 max-h-[480px] overflow-y-auto font-mono text-xs"></div>
  </section>

  <aside class="lg:col-span-3 space-y-4">
    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">本次产出</h2>
      <div id="artifact-list" class="space-y-2 text-xs max-h-[260px] overflow-y-auto">
        <div class="text-slate-500">_等待第一个产出..._</div>
      </div>
    </div>

    <div class="glass rounded-2xl p-4">
      <h2 class="font-bold mb-3 gradient-text">工具调用</h2>
      <div id="tool-list" class="space-y-1 text-xs max-h-[220px] overflow-y-auto"></div>
    </div>
  </aside>
</main>

<script>
const planId = (new URLSearchParams(location.search).get("plan_id")) ||
               document.getElementById("plan-id-display").textContent.replace("{{PLAN_ID}}", "").trim() ||
               "";

document.getElementById("plan-id-display").textContent = planId || "(未指定)";

// ── i18n: 事件 kind 与 工具名 ──
const KIND_LABELS = {
  "plan_start":              "🛫 任务启动",
  "plan.start":              "🛫 任务启动",
  "plan_done":               "🎉 任务交付",
  "plan.done":               "🎉 任务交付",
  "plan_error":              "❌ 任务失败",
  "step.start":              "🚀 步骤开始",
  "step.done":               "✅ 步骤完成",
  "step.failed":             "❌ 步骤失败",
  "step.skipped":            "⏭️ 步骤跳过",
  "user_message":            "🗣️ 用户消息",
  "assistant_text":          "💬 AI 回复",
  "tool_result":             "🛠️ 工具返回",
  "harness.assemble":        "🔧 组装上下文",
  "harness.llm_call.start":  "🤖 调用 LLM",
  "harness.llm_call.done":   "✅ LLM 完成",
  "harness.parse":           "📝 解析响应",
  "harness.permit":          "🔒 权限检查",
  "harness.tools.read.start":"🔍 读工具",
  "harness.tools.write.start":"✍️ 写工具",
  "harness.feedback":        "🔁 反馈结果",
  "harness.context_reset":   "🧹 上下文重置",
  "harness.end":             "🏁 终止判定",
};

const TOOL_LABELS = {
  "doc.create":     "📄 创建飞书文档",
  "doc.append":     "📝 AI 生成文档内容",
  "canvas.create":  "🎨 创建画布/架构图",
  "canvas.add_shape": "✏️ 画布添加形状",
  "slide.generate": "📊 生成 PPT 大纲与文件",
  "slide.rehearse": "🎤 生成演讲稿",
  "voice.transcribe": "🎙️ 语音转文字",
  "media.tts":      "🔊 文字转语音",
  "web.search":     "🌐 联网搜索",
  "archive.bundle": "📦 汇总归档",
  "im.fetch_thread":"💬 拉取群聊",
  "lark.im.fetch_thread": "💬 飞书群聊抓取",
  "lark.doc.search":"🔎 飞书文档检索",
  "lark.bitable.search": "📊 多维表格检索",
  "mentor.clarify": "❓ 主动澄清",
  "mentor.summarize": "📋 结构化总结",
};

function labelOf(kind, fallback="") { return KIND_LABELS[kind] || fallback || kind; }
function toolLabelOf(name) { return TOOL_LABELS[name] || name; }

// ── 状态 ──
let planStartedAt = null;       // unix sec
let stepTotal = 0;
let stepCompleted = 0;
let receivedKinds = [];

setInterval(() => {
  if (!planStartedAt) return;
  const sec = Math.floor(Date.now() / 1000 - planStartedAt);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  document.getElementById("elapsed").textContent = (m > 0 ? `${m}m ` : "") + `${s}s`;
}, 1000);

function updateProgress() {
  document.getElementById("step-total").textContent = stepTotal;
  document.getElementById("step-completed").textContent = stepCompleted;
  const pct = stepTotal > 0 ? Math.min(100, Math.round(stepCompleted / stepTotal * 100)) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
}

function pushArtifact(a) {
  const dom = document.getElementById("artifact-list");
  if (dom.querySelector(".text-slate-500")) dom.innerHTML = "";
  const it = document.createElement("a");
  it.className = "block p-2 rounded hover:bg-white/5 slide-in";
  const url = a.url || a.uri || "#";
  const kind = a.kind || a.type || "artifact";
  const ttl = a.title || kind;
  const emoji = {doc: "📄", canvas: "🎨", slide: "📊", tts: "🔊"}[kind] || "📦";
  it.href = url;
  it.target = "_blank";
  it.innerHTML = `<div class="text-blue-200">${emoji} ${ttl}</div><div class="text-slate-500 text-[10px] truncate">${url}</div>`;
  dom.appendChild(it);
}

// ── Sessions ──
async function loadSessions() {
  try {
    const list = await fetch("/api/sessions?limit=20").then(r => r.json());
    const dom = document.getElementById("session-list");
    dom.innerHTML = "";
    if (!list.length) {
      dom.innerHTML = '<div class="text-slate-500 text-sm">暂无 session。在飞书发条消息试试 ✨</div>';
      return;
    }
    for (const s of list) {
      const card = document.createElement("a");
      card.href = "?plan_id=" + s.session_id;
      card.className = "block p-2 rounded-lg hover:bg-white/5 slide-in";
      card.innerHTML = `
        <div class="font-mono text-xs text-blue-300">${(s.session_id||"").slice(0, 24)}</div>
        <div class="text-xs text-slate-400 mt-1">${s.mode||"-"} · ${s.user_open_id?.slice(-6)||""}</div>
      `;
      dom.appendChild(card);
    }
  } catch (e) { console.warn(e); }
}

// ── Tools ──
async function loadTools() {
  try {
    const tools = await fetch("/api/tools").then(r => r.json());
    const dom = document.getElementById("tool-list");
    dom.innerHTML = "";
    for (const t of tools) {
      const it = document.createElement("div");
      it.className = "flex items-center gap-2 p-1 rounded hover:bg-white/5";
      const dot = t.read_only ? "bg-blue-400" : "bg-orange-400";
      const cn = toolLabelOf(t.name);
      it.innerHTML = `
        <span class="w-2 h-2 rounded-full ${dot}"></span>
        <span class="text-blue-200">${cn}</span>
        <span class="ml-auto text-slate-500 text-[10px]">${t.read_only ? "读" : "写"}</span>
      `;
      dom.appendChild(it);
    }
  } catch (e) { console.warn(e); }
}

// ── SSE ──
function subscribeEvents() {
  if (!planId) return;
  const dom = document.getElementById("thinking-stream");
  document.getElementById("ws-status").textContent = "实时";

  try {
    const es = new EventSource("/api/events/" + planId);
    es.onmessage = (e) => {
      try {
        const evt = JSON.parse(e.data);
        receivedKinds.push(evt.kind);

        if (evt.kind === "plan_start" || evt.kind === "plan.start") {
          planStartedAt = evt.ts || Math.floor(Date.now() / 1000);
          stepTotal = (evt.payload?.steps || []).length || stepTotal;
          stepCompleted = 0;
          updateProgress();
        }
        if (evt.kind === "step.done") {
          stepCompleted += 1;
          updateProgress();
          // 工具产出 → artifacts
          const tool = evt.payload?.tool || "";
          const r = evt.payload?.result || evt.payload || {};
          if (tool === "doc.create" || tool === "doc.append") {
            if (r.url || r.doc_token) pushArtifact({kind: "doc", title: r.title || "飞书文档", url: r.url || ""});
          } else if (tool === "canvas.create") {
            if (r.tldraw_url || r.url) pushArtifact({kind: "canvas", title: r.title || "画布", url: r.tldraw_url || r.url});
          } else if (tool === "slide.generate") {
            const u = r.pptx_url_absolute || r.pptx_url || "";
            if (u) pushArtifact({kind: "slide", title: r.title || "演示稿", url: u});
          } else if (tool === "media.tts") {
            const u = r.mp3_url_absolute || r.mp3_url || "";
            if (u) pushArtifact({kind: "tts", title: "语音", url: u});
          }
        }
        if (evt.kind === "plan_done" || evt.kind === "plan.done") {
          for (const a of (evt.payload?.artifacts || [])) {
            pushArtifact(a);
          }
          document.getElementById("ws-status").textContent = "完成";
        }

        const item = document.createElement("div");
        item.className = "p-2 rounded slide-in flex gap-2";
        const t = new Date((evt.ts || Math.floor(Date.now()/1000)) * 1000);
        const tStr = t.toTimeString().slice(0, 8);
        const kindColor = {
          "user_message": "text-cyan-300",
          "assistant_text": "text-purple-300",
          "tool_result": "text-emerald-300",
          "step.start": "text-yellow-300",
          "step.done": "text-green-300",
          "step.failed": "text-red-300",
          "plan_start": "text-blue-300",
          "plan_done": "text-emerald-300",
          "plan_error": "text-red-300",
        }[evt.kind] || "text-slate-400";

        const tool = evt.payload?.tool ? `<span class="text-blue-200 ml-1">${toolLabelOf(evt.payload.tool)}</span>` : "";
        const detail = JSON.stringify(evt.payload || {}).slice(0, 200);

        item.innerHTML = `
          <span class="text-slate-500">${tStr}</span>
          <span class="${kindColor}">${labelOf(evt.kind)}</span>
          ${tool}
          <span class="text-slate-300 truncate">${detail}</span>
        `;
        dom.insertBefore(item, dom.firstChild);
      } catch (err) { console.warn(err); }
    };
    es.onerror = () => {
      document.getElementById("ws-status").textContent = "断开重连";
    };
    es.addEventListener("heartbeat", () => {
      document.getElementById("ws-status").textContent = "实时（心跳）";
    });
  } catch (e) { console.warn(e); }
}

async function loadPlanInfo() {
  if (!planId) {
    document.getElementById("thinking-stream").innerHTML =
      '<div class="text-slate-500 text-center py-8">请从飞书发送消息触发任务，dashboard 将实时展示 Agent 思维流。<br><br>示例：<code>OpenClaw 三件套</code></div>';
    return;
  }
}

loadSessions();
loadTools();
loadPlanInfo();
subscribeEvents();
setInterval(loadSessions, 10000);
</script>
</body>
</html>
