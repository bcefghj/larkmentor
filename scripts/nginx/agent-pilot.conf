# Agent-Pilot V1.5 · nginx 反代
# /          → :8001 dashboard
# /sse、/messages → :8003 反向 MCP server（Cursor / Claude Desktop 接入）
# 不暴露 :8001 / :8003 公网端口（UFW deny）

upstream agent_pilot_dashboard {
    server 127.0.0.1:8001;
    keepalive 16;
}

upstream agent_pilot_mcp {
    server 127.0.0.1:8003;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 50m;

    # ── MCP SSE（必须关 buffering） ──
    location /sse {
        proxy_pass http://agent_pilot_mcp;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    location /messages {
        proxy_pass http://agent_pilot_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /tools/ {
        proxy_pass http://agent_pilot_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Dashboard SSE（实时事件流） ──
    location ~ ^/api/events/ {
        proxy_pass http://agent_pilot_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # ── Dashboard 主体（HTML / JSON / 静态） ──
    location / {
        proxy_pass http://agent_pilot_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600;
    }

    location = /health {
        proxy_pass http://agent_pilot_dashboard/health;
        access_log off;
    }
}
