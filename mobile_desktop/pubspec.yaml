name: larkmentor_pilot
description: LarkMentor Agent-Pilot Co-pilot GUI - iOS / Android / macOS / Windows.
publish_to: none
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  webview_flutter: ^4.4.0
  webview_flutter_web: ^0.2.2+3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.1.0
  intl: ^0.19.0
  # Voice recording (mobile only; desktop uses file picker)
  record: ^5.0.4
  permission_handler: ^11.1.0
  # Offline Yjs bridge: we talk y-websocket protocol to the backend,
  # so the binary update is opaque bytes stored in local SQLite.
  sqflite: ^2.3.0
  # URL launching for share links
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
