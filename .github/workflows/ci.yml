name: Agent-Pilot CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FEISHU_APP_ID: test
  FEISHU_APP_SECRET: test
  PYTHONPATH: .

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Basic syntax check
      run: python -m py_compile main.py config.py

    - name: Import check
      run: |
        python -c "from core.agent_pilot import get_orchestrator; print('Core imports OK')"
        python -c "from core.resilience import retry_with_backoff; print('Resilience imports OK')"

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-timeout

    - name: Run core tests only
      run: |
        python -m pytest \
          tests/test_config_validation.py \
          tests/test_harness_components.py \
          tests/test_resilience.py \
          tests/test_agent_pilot.py \
          -v --tb=short --timeout=30 -x \
          -k "not plan_from_intent_convenience"

    - name: Upload coverage report
      if: matrix.python-version == '3.12'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: .coverage

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Check for secrets in code
      run: |
        pip install detect-secrets
        detect-secrets scan --baseline .secrets.baseline || true
        echo "Checking for hardcoded secrets (excluding config definitions)..."
        ! grep -rn "FEISHU_APP_SECRET\s*=\s*['\"]" --include="*.py" . | grep -v "Field\|default\|os\.\|getenv" || echo "Found potential hardcoded secrets"
        echo "Security check completed"

  docker:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t agent-pilot:ci .

    - name: Smoke test container
      run: |
        docker run --rm -e FEISHU_APP_ID=test -e FEISHU_APP_SECRET=test \
          agent-pilot:ci python -c "from core.agent_pilot import get_orchestrator; print('OK')"
