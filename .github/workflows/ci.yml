name: Agent-Pilot CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FEISHU_APP_ID: test
  FEISHU_APP_SECRET: test
  PYTHONPATH: .

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-lint-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy

    - name: Ruff lint
      run: ruff check . --output-format=github

    - name: Ruff format check
      run: ruff format --check .

    - name: Mypy type checking
      run: mypy core/ config.py --ignore-missing-imports --no-strict-optional

    - name: Basic syntax check
      run: python -m py_compile main.py config.py

    - name: Import check
      run: |
        python -c "from core.agent_pilot import get_orchestrator; print('Core imports OK')"
        python -c "from core.resilience import retry_with_backoff; print('Resilience imports OK')"

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-timeout

    - name: Run tests (excluding e2e/simulator)
      run: |
        python -m pytest tests/ \
          --ignore=tests/e2e --ignore=tests/simulator \
          -v --tb=short --timeout=60 \
          --cov=core --cov=agent --cov=bot --cov=llm --cov=dashboard \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml \
          --cov-report=html:htmlcov \
          --junitxml=junit-results.xml

    - name: Extract coverage percentage
      id: coverage
      if: always()
      run: |
        COV_PCT=$(python -m coverage report --format=total 2>/dev/null || echo "0")
        echo "percent=${COV_PCT}" >> $GITHUB_OUTPUT
        echo "Coverage: ${COV_PCT}%"

    - name: Check coverage threshold (60%)
      if: always()
      run: |
        python -m coverage report --fail-under=60

    - name: Upload coverage XML
      if: matrix.python-version == '3.12' && always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml

    - name: Upload coverage HTML report
      if: matrix.python-version == '3.12' && always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: htmlcov/

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: junit-results.xml

    - name: Coverage badge
      if: matrix.python-version == '3.12' && github.ref == 'refs/heads/main'
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_TOKEN }}
        gistID: ${{ secrets.COVERAGE_GIST_ID }}
        filename: coverage-badge.json
        label: coverage
        message: ${{ steps.coverage.outputs.percent }}%
        valColorRange: ${{ steps.coverage.outputs.percent }}
        minColorRange: 40
        maxColorRange: 90
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Check for secrets in code
      run: |
        pip install detect-secrets
        detect-secrets scan --baseline .secrets.baseline
        echo "Checking for hardcoded secrets (excluding config definitions)..."
        ! grep -rn "FEISHU_APP_SECRET\s*=\s*['\"]" --include="*.py" . | grep -v "Field\|default\|os\.\|getenv" || { echo "::error::Found potential hardcoded secrets"; exit 1; }
        echo "Security check completed"

  flutter-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: "3.24.0"
        channel: stable
        cache: true

    - name: Install Flutter dependencies
      working-directory: mobile_desktop
      run: flutter pub get

    - name: Flutter analyze
      working-directory: mobile_desktop
      run: flutter analyze

  docker:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t agent-pilot:ci .

    - name: Smoke test container
      run: |
        docker run --rm -e FEISHU_APP_ID=test -e FEISHU_APP_SECRET=test \
          agent-pilot:ci python -c "from core.agent_pilot import get_orchestrator; print('OK')"
