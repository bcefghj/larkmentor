# Category: 闲聊应被分级为 P3 / P2，非 P0
scenarios:
  - id: chat_001
    category: chitchat
    description: "纯闲聊"
    sender: { name: "陌生人A", id: "u_chat_001", identity: unknown }
    chat: { type: group, name: "公司大群", member_count: 200 }
    user_context: "PRD 文档"
    message: "哈哈哈这个表情包太搞笑了"
    expected_level: P3
    expected_action: archive

  - id: chat_002
    category: chitchat
    description: "OK 收到"
    sender: { name: "陌生人B", id: "u_chat_002", identity: unknown }
    chat: { type: group, name: "讨论群", member_count: 80 }
    user_context: ""
    message: "OK"
    expected_level: P3
    expected_action: archive

